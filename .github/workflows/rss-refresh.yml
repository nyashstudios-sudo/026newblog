name: RSS Feed Refresh

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Call RSS refresh API
        run: |
          curl -X GET "https://YOUR_DOMAIN.vercel.app/api/rss/refresh" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
